<!DOCTYPE html>
<html class="light" lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Corporate Portal - Halaman Belum Tersedia</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#00288e",
            "primary-fixed": "#dde1ff",
            "on-surface": "#151c27",
            "on-surface-variant": "#444653",
            surface: "#f9f9ff",
            "surface-container": "#e7eefe",
            "surface-container-low": "#f0f3ff",
            "surface-container-lowest": "#ffffff",
            outline: "#757684",
            "outline-variant": "#c4c5d5",
            secondary: "#5c5f60"
          },
          fontFamily: {
            body: ["Inter", "sans-serif"],
            headline: ["Manrope", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background: #f9f9ff;
    }
  </style>
</head>
<body class="min-h-screen font-body text-on-surface">
  <header class="bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-50">
    <nav class="h-16 max-w-7xl mx-auto px-6 flex items-center justify-between">
      <a class="font-headline text-xl font-bold text-primary" href="../">Corporate Portal</a>
      <div class="hidden sm:flex items-center gap-6 text-sm font-semibold">
        <a class="text-on-surface-variant hover:text-primary transition-colors" href="../unavailable/">Dashboard</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors" href="../">Requests</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors" href="../unavailable/">Guidelines</a>
      </div>
    </nav>
  </header>

  <main class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-3xl bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-8 md:p-12 text-center">
      <div class="mx-auto w-20 h-20 rounded-full bg-primary-fixed flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-5xl">construction</span>
      </div>
      <p class="mt-8 text-sm font-semibold tracking-[0.12em] uppercase text-primary">Corporate Portal</p>
      <h1 class="mt-3 font-headline text-3xl md:text-4xl font-bold text-on-surface">Halaman ini belum tersedia</h1>
      <p class="mt-4 text-base md:text-lg text-on-surface-variant max-w-xl mx-auto">
        Fitur yang kamu pilih sedang disiapkan. Untuk saat ini, silakan kembali ke halaman pengajuan atau halaman admin lanyard.
      </p>

      <div class="mt-8 flex flex-col sm:flex-row justify-center gap-3">
        <a class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary px-5 py-3 font-semibold text-white hover:opacity-90 transition-opacity" href="../">
          <span class="material-symbols-outlined">assignment</span>
          Halaman User
        </a>
        <a class="inline-flex items-center justify-center gap-2 rounded-lg border border-outline px-5 py-3 font-semibold text-on-surface hover:bg-surface-container-low transition-colors" href="../admin/">
          <span class="material-symbols-outlined">admin_panel_settings</span>
          Halaman Admin
        </a>
      </div>
    </section>
  </main>
</body>
</html>
